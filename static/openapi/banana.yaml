# Banana resource — referenced from openapi.yaml via $ref.
# Not a standalone OpenAPI document: `collection` and `item` are Path Item
# Objects pulled into the root spec's `paths`.

collection:
  get:
    tags: [banana]
    operationId: listBananas
    summary: List bananas
    parameters:
      - name: limit
        in: query
        description: Max items to return
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: A page of bananas
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Banana'
  post:
    tags: [banana]
    operationId: createBanana
    summary: Create a banana
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BananaInput'
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Banana'
      '400':
        description: Invalid input

item:
  parameters:
    - name: id
      in: path
      required: true
      description: Banana id
      schema:
        type: string
  get:
    tags: [banana]
    operationId: getBanana
    summary: Get a banana
    responses:
      '200':
        description: The banana
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Banana'
      '404':
        description: Not found
  put:
    tags: [banana]
    operationId: updateBanana
    summary: Update a banana
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BananaInput'
    responses:
      '200':
        description: Updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Banana'
      '404':
        description: Not found
  delete:
    tags: [banana]
    operationId: deleteBanana
    summary: Delete a banana
    responses:
      '204':
        description: Deleted
      '404':
        description: Not found

components:
  schemas:
    BananaInput:
      type: object
      required: [ripeness, lengthCm]
      properties:
        ripeness:
          type: string
          enum: [green, yellow, spotted]
          example: yellow
        lengthCm:
          type: number
          example: 18
        organic:
          type: boolean
          example: true
    Banana:
      allOf:
        - $ref: '#/components/schemas/BananaInput'
        - type: object
          required: [id, createdAt]
          properties:
            id:
              type: string
              example: ban_01
            createdAt:
              type: string
              format: date-time
              example: '2026-06-20T00:00:00Z'
