    misc_Language:
      name: lan
      in: path
      required: true
      description: Language code
      schema:
        type: string
        enum:
          - en
          - ja
          - ko
    post_Classification:
      name: classification
      in: path
      required: true
      description: Post classification (e.g. `blog`, `dev`, `trends`)
      schema:
        type: string
    post_Category:
      name: category
      in: path
      required: true
      description: Post category within the classification
      schema:
        type: string
    post_Slug:
      name: slug
      in: path
      required: true
      description: URL-friendly post identifier
      schema:
        type: string
    post_ClassificationQuery:
      name: classification
      in: query
      required: true
      description: Post classification (e.g. `blog`, `dev`, `trends`)
      schema:
        type: string
    post_CategoryQuery:
      name: category
      in: query
