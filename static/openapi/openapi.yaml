      in: path
      required: true
      description: Post classification (e.g. `blog`, `dev`)
      schema:
        type: string
    comment_Category:
      name: category
      in: path
      required: true
      description: Post category within the classification
      schema:
        type: string
    comment_Slug:
      name: slug
      in: path
      required: true
      description: URL-friendly post identifier
      schema:
        type: string
    comment_CommentId:
      name: comment_id
      in: path
      required: true
      description: Comment identifier
      schema:
        type: string
    hackernews_Date:
      name: date
      in: path
      required: true
