openapi: 3.1.0
info:
  title: mogumogu API
  description: |
    Demo API reference for the mogumogu docs site.

    The spec is split per resource: this root file only wires the paths
    together, while each resource (apple, banana) lives in its own file and is
    pulled in via `$ref`. Fill in real resources by adding more files and
    referencing them here.
  version: 0.0.1
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.mogumogu.dev
    description: Production
  - url: http://localhost:8080
    description: Local

tags:
  - name: apple
    description: Apple resource (demo)
  - name: banana
    description: Banana resource (demo)

paths:
  /api/apple:
    $ref: './apple.yaml#/collection'
  /api/apple/{id}:
    $ref: './apple.yaml#/item'
  /api/banana:
    $ref: './banana.yaml#/collection'
  /api/banana/{id}:
    $ref: './banana.yaml#/item'
