        ok:
          type: boolean
        keyCount:
          type: integer
        keys:
          type: array
          items:
            type: string
    hackernews_OkErrorResponse:
      type: object
      description: 'Error response using `ok: false` pattern'
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
    hackernews_ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
    hackernews_FlushRequest:
      type: object
      required:
        - type
        - total
      properties:
        type:
          type: string
          enum:
            - fetch
            - summarize
            - translate
          description: Which processing step to flush
        total:
          type: integer
          description: Expected number of completed tasks
        lang:
          type: string
          enum:
            - ko
            - ja
          description: Target language (required when `type` is `translate`)
    misc_SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          const: true
    misc_LanguageErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
    misc_OkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          const: true
    misc_OkErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          description: Human-readable error message
    misc_TurnstileVerifyRequest:
      type: object
      required:
        - turnstileToken
      properties:
        turnstileToken:
          type: string
          description: Cloudflare Turnstile client-side token
    misc_DiscordAdminRequest:
      type: object
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          bug_report: '#/components/schemas/misc_BugReportPayload'
          comment_create: '#/components/schemas/misc_CommentCreatePayload'
          comment_update: '#/components/schemas/misc_CommentUpdatePayload'
          comment_delete: '#/components/schemas/misc_CommentDeletePayload'
      oneOf:
        - $ref: '#/components/schemas/misc_BugReportPayload'
        - $ref: '#/components/schemas/misc_CommentCreatePayload'
        - $ref: '#/components/schemas/misc_CommentUpdatePayload'
        - $ref: '#/components/schemas/misc_CommentDeletePayload'
    misc_BugReportPayload:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: bug_report
        title:
          type: string
          description: Bug report title
        content:
          type: string
          description: Bug report details
    misc_CommentCreatePayload:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: comment_create
        content:
          type: string
          description: Comment content
        username:
          type: string
          description: Comment author username
        post_url:
          type: string
          format: uri
          description: URL of the post where the comment was created
    misc_CommentUpdatePayload:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: comment_update
        updatedContent:
          type: string
          description: Updated comment content
        username:
          type: string
          description: Comment author username
        post_url:
          type: string
          format: uri
          description: URL of the post where the comment was updated
    misc_CommentDeletePayload:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          const: comment_delete
        username:
          type: string
          description: Comment author username
        post_url:
          type: string
          format: uri
          description: URL of the post where the comment was deleted
    post_PostMeta:
      type: object
      description: Post metadata returned from frontmatter or slug parsing
      required:
        - title
        - date
        - classification
        - category
      properties:
        fileName:
          type:
            - string
            - 'null'
          description: MDX file name (absent for trends posts)
        title:
          type: string
        date:
          type: string
          description: Publication date (ISO 8601 date, e.g. `2025-06-01`)
        classification:
          type: string
        category:
          type: string
        image:
          type:
            - string
            - 'null'
          description: Cover image path (absent for trends posts)
    post_SyncResponse:
      type: object
      required:
        - ok
        - inserted
        - message
      properties:
        ok:
          type: boolean
        inserted:
          type: integer
          description: Number of posts upserted
        message:
          type: string
    post_IndexingResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        message:
          type: string
          description: Present when there are no unindexed posts
        processedCount:
          type: integer
          description: Number of posts processed
        indexingResults:
          type: array
          description: Per-post indexing results
          items:
            $ref: '#/components/schemas/post_IndexingResult'
    post_IndexingResult:
      type: object
      required:
        - postId
        - urls
        - allSuccess
      properties:
        postId:
          type: string
          format: uuid
        urls:
          type: array
          items:
            $ref: '#/components/schemas/post_IndexingUrlResult'
        allSuccess:
          type: boolean
          description: True only when all locale URLs were indexed successfully
    post_IndexingUrlResult:
      type: object
      required:
        - url
        - result
      properties:
        url:
          type: string
          format: uri
        result:
          type: object
          required:
            - ok
          properties:
            ok:
              type: boolean
            error:
              type: string
            data:
              type: object
    post_LikeStatus:
      type: object
      required:
        - likeCount
        - liked
      properties:
        likeCount:
          type: integer
          description: Total number of likes on the post
        liked:
          type: boolean
          description: Whether the queried user has liked the post
    post_MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    post_ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
    post_LikeRequest:
      type: object
      required:
        - userEmail
      properties:
        userEmail:
          type: string
          format: email
          description: Email address of the user performing the like action
    visitor_OkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    visitor_VisitorFound:
      type: object
      required:
        - ok
        - found
        - data
      properties:
        ok:
          type: boolean
          const: true
        found:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/visitor_VisitorFingerprint'
    visitor_VisitorNotFound:
      type: object
      required:
        - ok
        - found
      properties:
        ok:
          type: boolean
          const: false
        found:
          type: boolean
          const: false
    visitor_VisitorFingerprint:
      type: object
      description: Visitor record from the `visitor_fingerprint` table
      required:
        - id
        - fingerprint
        - is_bot
        - first_visited
        - last_visited
        - visit_count
      properties:
        id:
          type: string
          format: uuid
        fingerprint:
          type: string
        user_agent:
          type:
            - string
            - 'null'
        ip_address:
          type:
            - string
            - 'null'
        country:
          type:
            - string
            - 'null'
          description: ISO country code from Cloudflare `cf-ipcountry` header
        is_bot:
          type: boolean
          description: Detected via user-agent pattern matching
        first_visited:
          type: string
          format: date-time
        last_visited:
          type: string
          format: date-time
        visit_count:
          type: integer
    visitor_AnalyticsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/visitor_AnalyticsRow'
    visitor_AnalyticsRow:
      type: object
      required:
        - date
        - activeUsers
      properties:
        date:
          type: string
          description: Date in `YYYYMMDD` format
        activeUsers:
          type: string
          description: Number of active users (returned as string by GA4)
    visitor_HealthResponse:
      type: object
      required:
        - ok
        - status
      properties:
        ok:
          type: boolean
        status:
          type: string
    visitor_IndexingQuotaStatus:
      type: object
      required:
        - ok
        - apiName
        - used
        - remaining
        - maxDailyQuota
      properties:
        ok:
          type: boolean
        apiName:
          type: string
          description: Name of the tracked API (e.g. `google_indexing`)
        used:
          type: integer
          description: Number of API calls used today
        remaining:
          type: integer
          description: Remaining calls before hitting the daily quota
        maxDailyQuota:
          type: integer
          description: Maximum allowed API calls per day
    visitor_IndexingJobCreated:
      type: object
      required:
        - job_id
        - status
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          const: pending
    visitor_IndexingJobStatus:
      type: object
      required:
        - status
        - started
      properties:
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
        started:
          type: integer
          description: Job start time (Unix timestamp in milliseconds)
        finished:
          type: integer
          description: Job end time (Unix timestamp in milliseconds)
        error:
          type: string
          description: Error message (present only when status is `failed`)
    visitor_SearchEntry:
      type: object
      description: Cached full-text search entry built from MDX frontmatter
      required:
        - title
        - content
        - link
        - type
        - lang
      properties:
        title:
          type: string
        content:
          type: string
        link:
          type: string
          description: Locale-prefixed post path (e.g. `/en/blog/tech/my-post`)
        type:
          type: string
          const: post
        lang:
          type: string
          enum:
            - en
            - ja
            - ko
    visitor_ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
    visitor_RecordVisitorRequest:
      type: object
      required:
        - fingerprint
      properties:
        fingerprint:
          type: string
          description: Unique device/browser fingerprint identifier
  securitySchemes:
    auth_cookieAuth:
      type: apiKey
      in: cookie
      name: auth
      description: |
        JWT token stored in an httpOnly cookie.
        Issued on successful OAuth login; 2-hour expiry.
    hackernews_bearerAuth:
      type: http
      scheme: bearer
      description: >
        Bearer token for admin/cron endpoints.

        Validated against the server-side `HACKERNEWS_API_KEY` environment
        variable.
    post_bearerAuth:
      type: http
      scheme: bearer
      description: >
        Bearer token for internal/cron endpoints.

        Validated against the server-side `HACKERNEWS_API_KEY` environment
        variable.
    visitor_bearerAuth:
      type: http
      scheme: bearer
      description: >
        Bearer token for internal/cron endpoints.

        Validated against the server-side `HACKERNEWS_API_KEY` environment
        variable.
  responses:
    hackernews_Unauthorized:
      description: Missing or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/hackernews_ErrorResponse'
          example:
            error: Unauthorized
    hackernews_Forbidden:
      description: Invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/hackernews_ErrorResponse'
          example:
            error: Forbidden
