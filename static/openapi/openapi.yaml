  /api/hackernews/flush:
    post:
      operationId: flushCacheToday
      summary: Flush Redis cache to R2 for today
      description: |
        Validates that all background tasks of the given `type` have
        completed by comparing Redis key counts against `total`, then
        moves cached data from Redis into the R2 article JSON file.
        Each flushed Redis key is deleted after the value is written.

        **Flush conditions:**
        - `fetch` — `content:*` key count equals `total`
        - `summarize` — `en:*` key count equals `total`
        - `translate` — `{lang}:*` key count equals `total × 2`
          (title + summary per article)
      tags:
        - hackernews_cache
      security:
        - hackernews_bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/hackernews_FlushRequest'
            examples:
              fetchFlush:
                summary: Flush fetched content
                value:
                  type: fetch
                  total: 88
              translateFlush:
                summary: Flush Korean translations
                value:
                  type: translate
                  total: 60
                  lang: ko
      responses:
        '200':
          description: Flush result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/hackernews_FlushResponse'
                  - $ref: '#/components/schemas/hackernews_OkErrorResponse'
              examples:
                flushed:
                  summary: Successfully flushed
                  value:
                    ok: true
                    type: fetch
                    lang: null
                    attempted: true
                    canFlush: true
                    flushed: 88
                    counts:
                      en: 0
                      ja: 0
                      ko: 0
                      content: 0
                    totalKeys: 0
                    message: Flushed 88 items to R2.
                notReady:
                  summary: Tasks not yet complete
                  value:
                    ok: true
                    type: fetch
                    lang: null
                    attempted: true
                    canFlush: false
                    flushed: 0
                    counts:
                      en: 0
                      ja: 0
                      ko: 0
                      content: 42
                    totalKeys: 42
                    message: Flush condition not met...
        '401':
          $ref: '#/components/responses/hackernews_Unauthorized'
        '403':
          $ref: '#/components/responses/hackernews_Forbidden'
  /api/hackernews/flush/{date}:
    parameters:
      - $ref: '#/components/parameters/hackernews_Date'
    post:
      operationId: flushCacheByDate
      summary: Flush Redis cache to R2 by date
      description: |
        Same as `flushCacheToday` but targets a specific date.
      tags:
        - hackernews_cache
      security:
        - hackernews_bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/hackernews_FlushRequest'
      responses:
        '200':
          description: Flush result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/hackernews_FlushResponse'
                  - $ref: '#/components/schemas/hackernews_OkErrorResponse'
        '401':
          $ref: '#/components/responses/hackernews_Unauthorized'
        '403':
          $ref: '#/components/responses/hackernews_Forbidden'
  /api/hackernews/redis/count:
    get:
      operationId: getRedisKeyCount
      summary: Get Redis cache key count
      description: |
        Returns all keys currently in Redis along with the total count.
        Useful for monitoring background task progress before flushing.
      tags:
        - hackernews_cache
      security: []
      responses:
        '200':
          description: Redis key listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hackernews_RedisCountResponse'
              example:
                ok: true
                keyCount: 3
                keys:
                  - content:abc123def456
                  - en:xyz789012345
                  - ko:title:abc123def456
        '500':
          description: Redis connection failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hackernews_OkErrorResponse'
              example:
                ok: false
                error: Redis Connection Failed
  /api/language/{lan}:
